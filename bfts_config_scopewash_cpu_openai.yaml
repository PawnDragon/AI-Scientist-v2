# Lightweight BFTS config for agent-security benchmarks on CPU.
data_dir: "data"
preprocess_data: False

goal: null
eval: null

log_dir: logs
workspace_dir: workspaces

copy_data: True
exp_name: run

exec:
  timeout: 1200
  agent_file_name: runfile.py
  format_tb_ipython: False

generate_report: False
report:
  model: gpt-5.5
  temp: 1.0

experiment:
  num_syn_datasets: 1
  agent_benchmark_only: True
  no_local_model_training: True
  llm_agents_use_openai_api: True
  require_llm_agent_calls: True

debug:
  stage4: False

agent:
  type: parallel
  num_workers: 1
  max_main_stage: 1
  stages:
    stage1_max_iters: 3
    stage2_max_iters: 1
    stage3_max_iters: 1
    stage4_max_iters: 1
  steps: 2
  k_fold_validation: 1
  multi_seed_eval:
    num_seeds: 1
  expose_prediction: False
  data_preview: False

  code:
    model: gpt-5.5
    temp: 1.0
    max_tokens: 12000

  feedback:
    model: gpt-5.5
    temp: 1.0
    max_tokens: 12000

  vlm_feedback:
    model: gpt-5.5
    temp: 1.0
    max_tokens: 12000

  search:
    max_debug_depth: 2
    debug_prob: 0.5
    num_drafts: 1
